name: Publish Cue Windows v0.2.1

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: cue-windows-v0.2.1-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v0.2.1
      RELEASE_VERSION: 0.2.1
      SOURCE_COMMIT: 9ed0ce07b5dcaee87dbe67490086e5008a86cb83
      VERIFIED_RUN_ID: "29534944451"

    steps:
      - name: Confirm release does not already exist
        shell: pwsh
        run: |
          gh release view "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $env:RELEASE_TAG already exists. Refusing to replace it."
          }

      - name: Download verified Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release-assets" -Force | Out-Null
          gh run download "$env:VERIFIED_RUN_ID" `
            --repo "$env:GITHUB_REPOSITORY" `
            --name "cue-windows-11-x64" `
            --dir "release-assets"

          if ($LASTEXITCODE -ne 0) {
            throw "Could not download the verified Windows build."
          }

      - name: Verify release assets and create checksums
        shell: pwsh
        run: |
          $installer = "release-assets\cue-windows-11-$env:RELEASE_VERSION-x64.exe"
          $portable = "release-assets\cue-windows-11-$env:RELEASE_VERSION-x64.zip"

          $expected = @{
            $installer = "ebc40bad0c4f39972e7d4ae62624849fe190a7e973ec52580c86a731c70cafe7"
            $portable = "ded4b3b8d863a3da29712daf305eea40b823e358ad90262c8ac2b3703cccaa2c"
          }

          $checksumLines = foreach ($file in @($installer, $portable)) {
            if (-not (Test-Path $file -PathType Leaf)) {
              throw "Required release asset is missing: $file"
            }

            $actual = (Get-FileHash $file -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $expected[$file]) {
              throw "SHA-256 verification failed for $file"
            }

            "$actual  $([IO.Path]::GetFileName($file))"
          }

          $checksumLines | Set-Content "release-assets\SHA256SUMS.txt" -Encoding ascii

      - name: Create release notes
        shell: pwsh
        run: |
          @"
          # Cue for Windows 11 v0.2.1

          This is the first packaged Windows 11 release of Cue. It is based on the original macOS project by Blueturboguy07 and has been adapted for Windows 11.

          ## Highlights

          - Native Windows 11 x64 installer with a selectable installation folder
          - Portable Windows ZIP package
          - Windows system-audio loopback for Zoom and other meeting applications
          - Separate microphone and meeting-audio transcription
          - Screen context from the Windows display under the mouse pointer
          - Windows keyboard shortcuts and first-launch guidance
          - API keys protected with Windows DPAPI through Electron safeStorage
          - Gemini 3.1 Flash-Lite for fast responses and transcription
          - Gemini 3.5 Flash for Smart mode
          - Automatic migration from retired Gemini 2.5 model settings
          - 11 automated tests and no high-severity dependency vulnerabilities

          ## Downloads

          - **cue-windows-11-0.2.1-x64.exe**: Recommended Windows installer
          - **cue-windows-11-0.2.1-x64.zip**: Portable version
          - **SHA256SUMS.txt**: SHA-256 checksums for file-integrity verification

          ## Installation

          Download and run the EXE. The installer is per-user and does not require administrator access.

          The build is currently unsigned, so Windows SmartScreen may display an unrecognized-app warning. Only continue when the file was downloaded directly from this GitHub release.

          ## Upstream credit

          The Windows edition is derived from Blueturboguy07/cue, which was originally developed for macOS. This release preserves the upstream attribution and GPL-3.0-or-later license.
          "@ | Set-Content "release-notes.md" -Encoding utf8

      - name: Publish GitHub release
        shell: pwsh
        run: |
          $installer = "release-assets\cue-windows-11-$env:RELEASE_VERSION-x64.exe"
          $portable = "release-assets\cue-windows-11-$env:RELEASE_VERSION-x64.zip"

          gh release create "$env:RELEASE_TAG" `
            "$installer#Windows 11 x64 installer" `
            "$portable#Windows 11 x64 portable package" `
            "release-assets\SHA256SUMS.txt#SHA-256 checksums" `
            --repo "$env:GITHUB_REPOSITORY" `
            --target "$env:SOURCE_COMMIT" `
            --title "Cue for Windows 11 $env:RELEASE_TAG" `
            --notes-file "release-notes.md" `
            --latest

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release publication failed."
          }

      - name: Verify published release
        shell: pwsh
        run: |
          $release = gh release view "$env:RELEASE_TAG" `
            --repo "$env:GITHUB_REPOSITORY" `
            --json url,isDraft,assets | ConvertFrom-Json

          if ($release.isDraft) {
            throw "The release is still a draft."
          }

          $assetNames = @($release.assets | ForEach-Object { $_.name })
          $expectedAssets = @(
            "cue-windows-11-0.2.1-x64.exe",
            "cue-windows-11-0.2.1-x64.zip",
            "SHA256SUMS.txt"
          )

          foreach ($asset in $expectedAssets) {
            if ($assetNames -notcontains $asset) {
              throw "Published release is missing asset: $asset"
            }
          }

          "## Published $env:RELEASE_TAG" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "$($release.url)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "Assets: $($assetNames -join ', ')" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
